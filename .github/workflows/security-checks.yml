name: Security checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  mbam-web-security:
    name: Frontend security checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mbam-web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mbam-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm run type-check

      - name: Run tests
        run: npm test

      - name: Run npm audit
        run: npm audit --audit-level=moderate

  secret-pattern-scan:
    name: Secret pattern scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan for common committed secret patterns
        run: |
          if grep -RInE "(AKIA[0-9A-Z]{16}|-----BEGIN (RSA|OPENSSH|EC|DSA) PRIVATE KEY-----|ghp_[A-Za-z0-9_]{36,}|xox[baprs]-[A-Za-z0-9-]+)" . \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude=security-checks.yml; then
            echo "Potential secret pattern found. Review output above."
            exit 1
          fi
