# Private testing stack for Mbam.
#
# This compose file runs the web app, Rust API, and PostgreSQL on one machine.
# The web service binds to 127.0.0.1:8080 so it is not exposed publicly by default.
# Put Tailscale Serve, Cloudflare Tunnel, or another private access layer in front of it.

services:
  db:
    image: postgres:16-alpine
    container_name: mbam-private-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mbam
      POSTGRES_USER: mbam
      POSTGRES_PASSWORD: mbam_private_password_change_me
    volumes:
      - mbam_private_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mbam -d mbam"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./mbam-api
    container_name: mbam-private-api
    restart: unless-stopped
    environment:
      APP_ENV: private-test
      API_HOST: 0.0.0.0
      API_PORT: 8080
      DATABASE_URL: postgres://mbam:mbam_private_password_change_me@db:5432/mbam
      JWT_ACCESS_SECRET: replace_this_access_secret_before_real_testing
      JWT_REFRESH_SECRET: replace_this_refresh_secret_before_real_testing
      ACCESS_TOKEN_MINUTES: 15
      REFRESH_TOKEN_DAYS: 30
      WEB_ORIGIN: http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"

  web:
    build:
      context: ./mbam-web
    container_name: mbam-private-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:8080:80"

volumes:
  mbam_private_pgdata:
