# Local PostgreSQL for Mbam development.
#
# Run the Rust API and Vite web server directly on the host. This compose file
# intentionally manages only the database.

services:
  db:
    image: postgres:16-alpine
    container_name: mbam-private-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mbam}
      POSTGRES_USER: ${POSTGRES_USER:-mbam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mbam_private_password_change_me}
    volumes:
      - mbam_private_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mbam} -d ${POSTGRES_DB:-mbam}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mbam_private_pgdata:
