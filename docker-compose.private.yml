# Local PostgreSQL and Keycloak for Mbam development.
#
# Run the Rust API and Vite web server directly on the host. This compose file
# starts the database and identity provider together.

services:
  db:
    image: postgres:16-alpine
    container_name: mbam-private-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mbam}
      POSTGRES_USER: ${POSTGRES_USER:-mbam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mbam_private_password_change_me}
    volumes:
      - mbam_private_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mbam} -d ${POSTGRES_DB:-mbam}"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      keycloak:
        condition: service_started

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    container_name: mbam-private-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change_this_local_admin_password}
      KC_HEALTH_ENABLED: "true"
    volumes:
      - mbam_private_keycloak_data:/opt/keycloak/data
      - ./keycloak/mbam-realm.json:/opt/keycloak/data/import/mbam-realm.json:ro
    ports:
      - "127.0.0.1:${KEYCLOAK_HOST_PORT:-8180}:8080"

volumes:
  mbam_private_pgdata:
  mbam_private_keycloak_data:
