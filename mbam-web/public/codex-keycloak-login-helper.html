<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Keycloak Login Helper</title>
  </head>
  <body>
    <p>Preparing test login...</p>
    <script type="module">
      const authServerUrl = "http://127.0.0.1:8180";
      const realm = "mbam";
      const clientId = "mbam-web";
      const redirectUri = "http://127.0.0.1:5173/dashboard-picker";
      const params = new URLSearchParams(window.location.search);
      const loginHint = params.get("email") ?? "cashier.test@mbam.local";
      const prompt = params.get("prompt") ?? "login";

      function randomString(length) {
        const alphabet =
          "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~";
        const bytes = new Uint8Array(length);
        crypto.getRandomValues(bytes);
        return Array.from(
          bytes,
          (value) => alphabet[value % alphabet.length],
        ).join("");
      }

      function bytesToBase64Url(bytes) {
        const base64 = btoa(String.fromCharCode(...bytes));
        return base64.replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
      }

      async function sha256Base64Url(value) {
        const data = new TextEncoder().encode(value);
        const digest = await crypto.subtle.digest("SHA-256", data);
        return bytesToBase64Url(new Uint8Array(digest));
      }

      async function start() {
        const state = crypto.randomUUID();
        const nonce = crypto.randomUUID();
        const pkceCodeVerifier = randomString(96);
        const codeChallenge = await sha256Base64Url(pkceCodeVerifier);
        localStorage.setItem(
          `kc-callback-${state}`,
          JSON.stringify({
            state,
            nonce,
            redirectUri,
            loginOptions: { redirectUri },
            prompt,
            pkceCodeVerifier,
            expires: Date.now() + 60 * 60 * 1000,
          }),
        );

        const authorizeParams = new URLSearchParams({
          client_id: clientId,
          redirect_uri: redirectUri,
          state,
          response_mode: "fragment",
          response_type: "code",
          scope: "openid",
          nonce,
          login_hint: loginHint,
          prompt,
          code_challenge: codeChallenge,
          code_challenge_method: "S256",
        });

        window.location.assign(
          `${authServerUrl}/realms/${realm}/protocol/openid-connect/auth?${authorizeParams.toString()}`,
        );
      }

      void start();
    </script>
  </body>
</html>
