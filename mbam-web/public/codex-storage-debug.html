<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Storage Debug</title>
  </head>
  <body>
    <pre id="output">Loading...</pre>
    <script type="module">
      import {
        getAccessToken,
        getActiveSession,
        hydrateActiveSession,
      } from "/src/services/authSessionStore.ts";
      import { getJson } from "/src/services/apiClient.ts";
      import { initializeKeycloak } from "/src/services/keycloakService.ts";

      async function start() {
        const activeSession = localStorage.getItem("mbam-active-session");
        const parsedSession = activeSession ? JSON.parse(activeSession) : null;
        const preservedAccessToken =
          parsedSession?.accessToken ??
          localStorage.getItem("mbam-debug-access-token");
        if (parsedSession?.accessToken) {
          localStorage.setItem(
            "mbam-debug-access-token",
            parsedSession.accessToken,
          );
        }
        let authorizationCheck = null;
        try {
          const response = await fetch("/api/v1/me/authorization", {
            headers: preservedAccessToken
              ? { Authorization: `Bearer ${preservedAccessToken}` }
              : undefined,
            credentials: "include",
          });
          authorizationCheck = {
            status: response.status,
            ok: response.ok,
          };
        } catch (error) {
          authorizationCheck = {
            error: String(error),
          };
        }

        let initializeKeycloakResult = "ok";
        try {
          await hydrateActiveSession();
          await initializeKeycloak();
        } catch (error) {
          initializeKeycloakResult = String(error);
        }

        const result = {
        href: window.location.href,
        localStorageKeys: Object.keys(localStorage),
        sessionStorageKeys: Object.keys(sessionStorage),
        activeSession,
        moduleActiveSession: getActiveSession(),
        moduleAccessTokenPrefix: getAccessToken()
          ? getAccessToken().slice(0, 24)
          : null,
        initializeKeycloakResult,
        preservedAccessTokenPrefix: preservedAccessToken
          ? preservedAccessToken.slice(0, 24)
          : null,
        keycloakKeys: Object.keys(localStorage).filter((key) =>
          key.startsWith("kc-callback-"),
        ),
        authorizationCheck,
        };
        try {
          const authorization = await getJson("/api/v1/me/authorization");
          result.apiClientAuthorization = {
            ok: true,
            identity: authorization.identity?.email ?? null,
          };
        } catch (error) {
          result.apiClientAuthorization = {
            ok: false,
            error: String(error),
          };
        }
        document.getElementById("output").textContent = JSON.stringify(
          result,
          null,
          2,
        );
      }

      void start();
    </script>
  </body>
</html>
